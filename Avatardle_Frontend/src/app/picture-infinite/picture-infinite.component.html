@if (!hasStarted()) {
<button class="infinite-play" (click)="startGame()">▶</button>
} @else {
<div style="
      position: relative;
      width: fit-content;
      margin: auto;
      font: 1.5rem avatar2;
      color: gray;
      z-index: 1;
    ">
    Score:
    <ngx-digit-flow [value]="score()" [continuous]="true" spinEasing="default"
        style="color: darkgoldenrod; font-size: 1.5rem" [duration]="500" />
</div>

@if (!isComplete()) {
<div class="search-bar-container">
    <img src="images/sokka_eyeglass.webp" alt="" width="333" height="250" />
    <input type="text" placeholder="Search episode..." spellcheck="false" autocomplete="off" #searchInput
        (input)="onInput($event)" (focusout)="isVisible.set(false)" (focusin)="
          isVisible.set(true);
          episodeList = searchVal == '' ? episodeData : episodeList
        " (keydown.enter)="onEnter()" (keydown.escape)="isVisible.set(false)"
        (keydown.arrowdown)="moveHighlight(1); $event.preventDefault()"
        (keydown.arrowup)="moveHighlight(-1); $event.preventDefault()" [(ngModel)]="searchVal" />

    <ul class="search-dropdown" style="z-index: 2" [style.display]="isVisible() ? 'block' : 'none'">
        @for (episode of episodeList; track episode; let i = $index) {
        <li style="white-space: pre" [class.highlighted]="i === highlightedIndex()" (mousedown)="onEnter(episode)">
            {{ episode }}
        </li>
        }
    </ul>
</div>
} @else {
<div class="infinite-result fade-in">
    <div class="title">Game Over</div>
    <div class="answer-reveal">
        The correct answer was: {{ targetEpisode }}
    </div>
    <button class="infinite-restart" (click)="restart()">↻ Play Again</button>
</div>
}

<div class="image-container">
    <div class="image-wrapper">
        <img [src]="targetFrame()" alt="A frame from an episode of Avatar: The Last Airbender" width="1440"
            height="1080" (error)="onImageError()" />
    </div>
</div>
}
